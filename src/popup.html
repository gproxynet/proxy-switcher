<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Proxy Switcher</title>
  </head>
  <body>
    <header class="head">
      <div class="brand">
        <img src="../icons/icon32.png" width="20" height="20" alt="" />
        <span>Proxy Switcher</span>
      </div>
      <div class="head-actions">
        <button id="import-btn" class="ghost" title="Import a list of proxies">Import</button>
        <button id="add-btn" class="ghost" title="Add one proxy">+ Add</button>
      </div>
    </header>

    <section class="status" id="status">
      <div class="status-row">
        <span class="dot" id="status-dot"></span>
        <span id="status-name">Direct</span>
      </div>
      <div class="ip-row">
        <span id="ip-text" class="muted">Checking IP…</span>
        <button id="ip-refresh" class="linklike" title="Re-check">↻</button>
      </div>
    </section>

    <ul class="list" id="list"></ul>

    <!-- Add / edit form (hidden by default) -->
    <form class="form hidden" id="form">
      <div class="form-title" id="form-title">Add proxy</div>
      <div class="grid">
        <label class="full">Name<input id="f-name" required placeholder="Scraper — US" /></label>
        <label>Type
          <select id="f-scheme">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
            <option value="socks5">SOCKS5</option>
            <option value="socks4">SOCKS4</option>
          </select>
        </label>
        <label>Color<input id="f-color" type="color" value="#14b8a6" /></label>
        <label class="full">Host <span class="hint">— or paste host:port:user:pass</span><input id="f-host" required placeholder="proxy.example.com" /></label>
        <label>Port<input id="f-port" type="number" min="1" max="65535" required placeholder="8000" /></label>
        <label>User<input id="f-user" placeholder="optional" autocomplete="off" /></label>
        <label>Password<input id="f-pass" type="password" placeholder="optional" autocomplete="off" /></label>
        <label class="full">Bypass (comma-sep)<input id="f-bypass" placeholder="localhost, 127.0.0.1, <local>" /></label>
      </div>
      <div class="form-actions">
        <button type="button" id="f-cancel" class="ghost">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
      <input type="hidden" id="f-id" />
    </form>

    <!-- Bulk import view (hidden by default) -->
    <section class="import hidden" id="import">
      <div class="form-title">Import proxy list</div>
      <p class="import-help">
        One proxy per line. Any of these formats:
        <code>host:port</code>, <code>host:port:user:pass</code>,
        <code>user:pass@host:port</code>, <code>scheme://user:pass@host:port</code>.
        A leading <code>country,city,</code> label is used as the name.
      </p>
      <textarea id="import-text" rows="7" spellcheck="false"
        placeholder="203.0.113.10:8000&#10;user:pass@203.0.113.11:8000&#10;socks5://203.0.113.12:1080&#10;US,New York,203.0.113.13:8000:user:pass"></textarea>
      <label class="detect-row">
        <input type="checkbox" id="import-detect" checked />
        Auto-detect country &amp; city (looks up each IP)
      </label>
      <div class="form-actions import-actions">
        <label class="ghost file-btn">From file…<input type="file" id="import-file" accept=".txt,.csv,text/plain" hidden /></label>
        <span class="spacer"></span>
        <button type="button" id="import-cancel" class="ghost">Cancel</button>
        <button type="button" id="import-go" class="primary">Import</button>
      </div>
      <div class="import-status muted" id="import-status"></div>
    </section>

    <footer class="foot">
      <a id="get-proxies" href="#" target="_blank" rel="noopener">Need proxies? Get residential &amp; mobile →</a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
